<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LemonTeaDiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f8f9fa;
      color: #2c3e50;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .header {
      text-align: center;
      margin: 60px 0 50px;
    }
    .header h1 {
      font-size: 2.8em;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .header p {
      color: #666;
      font-size: 1.15em;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin: 40px 0;
    }
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.2s;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transform: translateY(-2px);
      border-color: #d0d0d0;
    }
    .card h3 {
      margin-top: 0;
      color: #2c3e50;
      font-size: 1.25em;
      margin-bottom: 10px;
    }
    .card p {
      color: #666;
      font-size: 0.92em;
      line-height: 1.5;
    }
    .recent {
      text-align: center;
      margin: 50px 0 30px;
    }
    .btn {
      display: inline-block;
      padding: 14px 36px;
      background: #2c3e50;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 1em;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #34495e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🍋 LemonTeaDiver</h1>
    </div>

    <div class="cards">
      <a href="/categories/知识树/" class="card">
        <h3>🌲 知识树</h3>
        <p>渲染与图形、物理与动画、网络同步、逻辑与 AI、系统架构、性能优化、数学与算法、工具链</p>
      </a>

      <a href="/categories/游乐场/" class="card">
        <h3>🎡 游乐场</h3>
      </a>

      <a href="/categories/前沿追踪/" class="card">
        <h3>🔭 前沿追踪</h3>
        <p>神经渲染、图像识别</p>
      </a>
    </div>

    <div class="recent">
      <a href="/notes/" class="btn">📄 查看最新笔记</a>
    </div>
  </div>
</body>
</html>
